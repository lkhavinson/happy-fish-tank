<!DOCTYPE html>
<html>
<head>
  <title>Happy Fish Tank</title>
  <style>
    body { margin:0; background:#060e1e; display:flex; justify-content:center; align-items:center; height:100vh; }
    canvas { border:8px solid #222; border-radius:12px; }
  </style>
</head>
<body>
<canvas id="tank" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('tank');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

const WATER_TOP  = [44,116,139];
const WATER_MID  = [22,86,118];
const WATER_BOT  = [13,47,70];
const SAND_DARK  = [116,96,67];
const SAND_LIGHT = [211,190,140];
const ROCK       = [89,94,92];
const ROCK_DARK  = [48,55,55];
const ROCK_LIGHT = [129,135,132];
const PLANT_DARK = [23,80,50];
const PLANT_MID  = [58,130,75];
const STONE      = [192,170,138];
const MORTAR     = [140,118,90];
const LITE       = [215,196,166];

function rgb(c,a=1){ return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
function blend(c1,c2,t){ return c1.map((v,i)=>Math.round(v+(c2[i]-v)*t)); }

// ── WATER ──────────────────────────────────────────────────────────────────
function drawWater(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,   rgb(WATER_TOP));
  g.addColorStop(0.45,rgb(WATER_MID));
  g.addColorStop(1,   rgb(WATER_BOT));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  [[60,0.11],[280,0.07],[560,0.08]].forEach(([sx,a])=>{
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle='rgb(215,242,236)';
    ctx.beginPath();
    ctx.moveTo(sx,0); ctx.lineTo(sx+95,0);
    ctx.lineTo(sx+210,H); ctx.lineTo(sx-70,H);
    ctx.closePath(); ctx.fill(); ctx.restore();
  });
}

// ── GRAVEL ─────────────────────────────────────────────────────────────────
function drawGravel(){
  const g = ctx.createLinearGradient(0,H-55,0,H);
  g.addColorStop(0,rgb(SAND_LIGHT)); g.addColorStop(1,rgb(SAND_DARK));
  ctx.fillStyle=g; ctx.fillRect(0,H-55,W,55);
  for(let x=18;x<W;x+=28){
    const y = H-45+Math.sin(x*0.09)*7;
    ctx.beginPath(); ctx.arc(x,y,1.8,0,Math.PI*2);
    ctx.fillStyle = (Math.floor(x/28))%2===0 ? rgb(SAND_LIGHT) : rgb(SAND_DARK);
    ctx.fill();
  }
}

// ── ROCK ───────────────────────────────────────────────────────────────────
function drawRock(x,y,w,h){
  ctx.beginPath(); ctx.ellipse(x+w/2+4,y+h/2+6,w/2,h/2,0,0,Math.PI*2);
  ctx.fillStyle=rgb(ROCK_DARK); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);
  ctx.fillStyle=rgb(ROCK); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*0.31,y+h*0.24,w*0.11,h*0.06,-0.3,0,Math.PI*2);
  ctx.fillStyle=rgb(ROCK_LIGHT); ctx.fill();
}

// ── PLANT ──────────────────────────────────────────────────────────────────
function drawPlant(bx,by,height,sway){
  [[-18,height*0.78,-0.38,9],[-8,height,-0.16,11],[4,height*0.92,0.08,10],
   [14,height*0.72,0.3,8],[24,height*0.58,0.48,7]].forEach(([off,lh,lean,lw])=>{
    const tx=bx+off+Math.sin(sway+off)*8+lean*26, ty=by-lh;
    const mx=bx+off/2+lean*18+Math.sin(sway+off*0.4)*3, my=by-lh*0.48;
    const dx=tx-bx, dy=ty-by, len=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const nx=-dy/len, ny=dx/len;
    ctx.beginPath();
    ctx.moveTo(bx-nx*lw*0.25, by-ny*lw*0.25);
    ctx.quadraticCurveTo(mx-nx*lw, my-ny*lw, tx, ty);
    ctx.quadraticCurveTo(mx+nx*lw*0.75, my+ny*lw*0.75, bx+nx*lw*0.25, by+ny*lw*0.25);
    ctx.closePath(); ctx.fillStyle=rgb(PLANT_DARK); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bx,by);
    ctx.quadraticCurveTo(mx-nx*lw*0.38, my-ny*lw*0.38, tx, ty);
    ctx.quadraticCurveTo(mx+nx*lw*0.18, my+ny*lw*0.18, bx, by);
    ctx.closePath(); ctx.fillStyle=rgb(PLANT_MID); ctx.fill();
  });
}

// ── CASTLE ─────────────────────────────────────────────────────────────────
const CX=400, BASE=H-55;

function brickWall(left,top,w,h){
  ctx.fillStyle=rgb(STONE);
  ctx.beginPath(); ctx.roundRect(left,top,w,h,2); ctx.fill();
  const bh=11;
  ctx.strokeStyle=rgb(MORTAR); ctx.lineWidth=1;
  for(let row=0; row*bh<=h+bh; row++){
    const ry=top+row*bh; if(ry>top+h) break;
    ctx.beginPath(); ctx.moveTo(left,ry); ctx.lineTo(left+w,ry); ctx.stroke();
    const shift=row%2===0?12:0;
    for(let x=left+shift; x<left+w; x+=24){
      ctx.beginPath(); ctx.moveTo(x,ry); ctx.lineTo(x,Math.min(ry+bh,top+h)); ctx.stroke();
    }
  }
  ctx.strokeStyle=rgb(LITE);
  ctx.beginPath(); ctx.moveTo(left,top); ctx.lineTo(left+w,top); ctx.stroke();
}

function drawCastle(){
  ctx.save(); ctx.globalAlpha=0.4;
  ctx.beginPath(); ctx.ellipse(CX,BASE-2,58,7,0,0,Math.PI*2);
  ctx.fillStyle=rgb(MORTAR); ctx.fill(); ctx.restore();

  brickWall(CX-57, BASE-75, 22, 75);
  brickWall(CX+35, BASE-75, 22, 75);
  brickWall(CX-35, BASE-55, 70, 55);

  [CX-57, CX+35].forEach(tx=>{
    for(let i=0;i<2;i++){
      const bx=tx+2+i*10;
      ctx.fillStyle=rgb(STONE); ctx.beginPath(); ctx.roundRect(bx,BASE-85,8,12,1); ctx.fill();
      ctx.strokeStyle=rgb(LITE); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(bx,BASE-85); ctx.lineTo(bx+7,BASE-85); ctx.stroke();
    }
  });
  for(let i=0;i<3;i++){
    const bx=CX-24+i*20;
    ctx.fillStyle=rgb(STONE); ctx.beginPath(); ctx.roundRect(bx,BASE-65,11,12,1); ctx.fill();
    ctx.strokeStyle=rgb(LITE); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx,BASE-65); ctx.lineTo(bx+10,BASE-65); ctx.stroke();
  }
  ctx.fillStyle=rgb(MORTAR);
  ctx.fillRect(CX-8,BASE-26,16,26);
  ctx.beginPath(); ctx.ellipse(CX,BASE-26,8,8,0,Math.PI,0); ctx.fill();
}

// ── TREASURE CHEST ─────────────────────────────────────────────────────────
function drawChest(){
  const x=292, y=H-91;
  ctx.save(); ctx.globalAlpha=0.25;
  ctx.beginPath(); ctx.ellipse(x+29,y+51,38,8,0,0,Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill(); ctx.restore();

  ctx.fillStyle='rgb(107,67,38)';
  ctx.beginPath(); ctx.roundRect(x,y+20,74,38,6); ctx.fill();
  ctx.fillStyle=rgb(blend([107,67,38],[57,55,57],0.35));
  ctx.beginPath(); ctx.roundRect(x+4,y+39,66,15,4); ctx.fill();
  ctx.fillStyle='rgb(195,151,62)';
  ctx.fillRect(x+33,y+20,8,38); ctx.fillRect(x,y+30,74,5);
  ctx.fillStyle=rgb(blend([107,67,38],[255,255,255],0.12));
  ctx.beginPath(); ctx.moveTo(x+5,y+17); ctx.lineTo(x+66,y-8);
  ctx.lineTo(x+78,y+12); ctx.lineTo(x+17,y+36); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgb(195,151,62)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(x+8,y+18); ctx.lineTo(x+68,y-6); ctx.stroke();
  [[x+16,y+17,4],[x+25,y+13,3],[x+39,y+13,4],[x+50,y+8,3],[x+59,y+16,4]].forEach(([cx2,cy2,r])=>{
    ctx.beginPath(); ctx.arc(cx2,cy2,r,0,Math.PI*2);
    ctx.fillStyle='rgb(195,151,62)'; ctx.fill();
    ctx.strokeStyle='rgb(140,100,35)'; ctx.lineWidth=1; ctx.stroke();
  });
}

// ── SQUID ──────────────────────────────────────────────────────────────────
function drawSquid(t){
  const drift=t/700;
  const x=250+Math.sin(drift)*10, y=165+Math.cos(drift*0.8)*5;
  const sc=0.78;
  const sp2=(px,py)=>[x+(px-x)*sc, y+(py-y)*sc];
  ctx.save();
  const mantle=[sp2(x,y-35),sp2(x-22,y-4),sp2(x-17,y+28),sp2(x,y+38),sp2(x+17,y+28),sp2(x+22,y-4)];
  ctx.beginPath(); ctx.moveTo(...mantle[0]); mantle.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath();
  ctx.fillStyle='rgb(46,112,132)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(...mantle[0]); mantle.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath();
  ctx.fillStyle='rgb(122,205,218)'; ctx.fill();
  const [lex,ley,lew,leh]=[x-9*sc,y-18*sc,18*sc,35*sc];
  ctx.beginPath(); ctx.ellipse(lex+lew/2,ley+leh/2,lew/2,leh/2,0,0,Math.PI*2);
  ctx.fillStyle='rgba(178,237,240,0.7)'; ctx.fill();
  [[sp2(x-16,y-7),sp2(x-31,y+10),sp2(x-17,y+11)],[sp2(x+16,y-7),sp2(x+31,y+10),sp2(x+17,y+11)]].forEach(pts=>{
    ctx.beginPath(); ctx.moveTo(...pts[0]); pts.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath();
    ctx.fillStyle='rgb(178,237,240)'; ctx.fill();
  });
  for(let i=0;i<6;i++){
    const off=(i-2.5)*6, curl=Math.sin(drift*1.4+i)*5;
    const [sx2,sy2]=sp2(x+off,y+28), [ex2,ey2]=sp2(x+off*1.25+curl,y+54);
    ctx.strokeStyle='rgb(46,112,132)'; ctx.lineWidth=3*sc;
    ctx.beginPath(); ctx.moveTo(sx2,sy2); ctx.lineTo(ex2,ey2); ctx.stroke();
  }
  [[x-8,y-2],[x+8,y-2]].forEach(([ex3,ey3])=>{
    const [px,py]=sp2(ex3,ey3);
    ctx.beginPath(); ctx.arc(px,py,4*sc,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.strokeStyle='rgb(10,24,30)'; ctx.lineWidth=1; ctx.stroke();
    const [px2,py2]=sp2(ex3+1,ey3);
    ctx.beginPath(); ctx.arc(px2,py2,1.7*sc,0,Math.PI*2); ctx.fillStyle='rgb(10,24,30)'; ctx.fill();
  });
  ctx.restore();
}

// ── GLASS ──────────────────────────────────────────────────────────────────
function drawGlass(){
  ctx.save();
  ctx.strokeStyle='rgba(0,8,14,0.13)'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.roundRect(0,0,W,H,12); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.11)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(12,8); ctx.lineTo(W-12,8); ctx.stroke();
  ctx.restore();
}

// ── FISH SPECIES ───────────────────────────────────────────────────────────
const SPECIES=[
  {name:'clownfish',   body:[255,65,0],  accent:[255,252,245], tail:[255,115,15], pattern:'clown',     L:44, H:18},
  {name:'blue tang',   body:[0,105,255], accent:[255,218,0],   tail:[0,52,215],   pattern:'tang',      L:48, H:19},
  {name:'gramma',      body:[162,0,255], accent:[255,205,0],   tail:[255,125,20], pattern:'gramma',    L:43, H:17},
  {name:'butterfly',   body:[255,228,0], accent:[15,15,25],    tail:[255,185,0],  pattern:'butterfly', L:46, H:21},
  {name:'angelfish',   body:[255,45,115],accent:[0,215,255],   tail:[255,65,140], pattern:'angel',     L:40, H:26},
];

class Bubble{
  constructor(rand){
    this.reset();
    if(rand) this.y=Math.random()*H;
  }
  reset(){ this.x=20+Math.random()*(W-40); this.y=H+10+Math.random()*200; this.r=2+Math.random()*4; this.speed=0.45+Math.random()*0.9; this.wobble=Math.random()*Math.PI*2; }
  update(){ this.y-=this.speed; this.wobble+=0.08; this.x+=Math.sin(this.wobble)*0.4; if(this.y<-this.r) this.reset(); }
  draw(){
    ctx.save();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(200,236,240,0.5)`; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(this.x-this.r/3,this.y-this.r/3,Math.max(1,this.r/5),0,Math.PI*2);
    ctx.fillStyle=`rgba(245,255,255,0.4)`; ctx.fill();
    ctx.restore();
  }
}

const FLAKE_COLORS=[[198,151,63],[182,92,58],[92,128,66],[162,112,68],[218,192,110]];
class Food{
  constructor(x,y){ this.x=x; this.y=y; this.sink=0.18+Math.random()*0.24; this.wobble=Math.random()*Math.PI*2; this.eaten=false;
    this.flakes=Array.from({length:12+Math.floor(Math.random()*6)},()=>({ox:(Math.random()-.5)*16,oy:(Math.random()-.5)*10,sz:1.4+Math.random()*1.4,a:Math.random()*Math.PI*2,c:FLAKE_COLORS[Math.floor(Math.random()*5)]}));
  }
  update(){ this.wobble+=0.045; this.x+=Math.sin(this.wobble)*0.12; this.y=Math.min(H-52,this.y+this.sink); }
  draw(){ this.flakes.forEach(f=>{ ctx.save(); ctx.translate(this.x+f.ox,this.y+f.oy); ctx.rotate(f.a+Math.sin(this.wobble)*0.12); ctx.beginPath(); ctx.ellipse(0,0,f.sz,f.sz*0.6,0,0,Math.PI*2); ctx.fillStyle=rgb(f.c); ctx.fill(); ctx.restore(); }); }
}

class Fish{
  constructor(sp){ this.sp=sp; this.x=100+Math.random()*600; this.y=80+Math.random()*(H-215); this.angle=Math.random()*Math.PI*2; this.speed=0.55+Math.random()*0.7; this.size=0.78+Math.random()*0.3; this.phase=Math.random()*Math.PI*2; this.waypoint=null; }
  update(foods){
    if(this.waypoint && foods.length===0){
      const [wx,wy]=this.waypoint, dx=wx-this.x, dy=wy-this.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d>8){ this.angle=Math.atan2(dy,dx); this.phase+=0.22; this.x+=dx/d*1.8; this.y+=dy/d*1.8; } else this.waypoint=null;
    } else if(foods.length>0){
      let cf=foods[0], md=Infinity;
      foods.forEach(f=>{ const d=Math.sqrt((this.x-f.x)**2+(this.y-f.y)**2); if(d<md){md=d;cf=f;} });
      const dx=cf.x-this.x, dy=cf.y-this.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){ this.angle=Math.atan2(dy,dx); this.phase+=0.22; this.x+=dx/d*1.8; this.y+=dy/d*1.8; } else cf.eaten=true;
    } else {
      this.angle+=(Math.random()-.5)*0.09;
      this.x+=Math.cos(this.angle)*this.speed; this.y+=Math.sin(this.angle)*this.speed;
      this.phase+=0.12+this.speed*0.05;
      if(this.x<0||this.x>W) this.angle=Math.PI-this.angle;
      if(this.y<45||this.y>H-105) this.angle=-this.angle;
      if(this.y>H-145 && Math.abs(this.x-CX)<62){ this.angle=-Math.abs(this.angle); this.y=Math.min(this.y,H-146); }
    }
  }
  draw(){
    const {sp,size}=this, L=sp.L*size, HH=sp.H*size, tail=Math.sin(this.phase)*5*size;
    const facingRight=Math.cos(this.angle)>=0;
    ctx.save();
    ctx.translate(this.x,this.y);
    if(!facingRight) ctx.scale(-1,1);

    // Shadow
    ctx.beginPath(); ctx.ellipse(2,2,L*0.5,HH*0.42,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fill();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-L*0.42,-HH*0.08);
    ctx.lineTo(-L*0.72,-HH*0.65+tail);
    ctx.lineTo(-L*0.60,0);
    ctx.lineTo(-L*0.72,HH*0.65+tail);
    ctx.lineTo(-L*0.42,HH*0.08);
    ctx.closePath(); ctx.fillStyle=rgb(sp.tail); ctx.fill();

    // Body
    ctx.beginPath();
    ctx.moveTo(-L*0.42,0);
    ctx.bezierCurveTo(-L*0.23,-HH*0.54, L*0.12,-HH*0.58, L*0.5,0);
    ctx.bezierCurveTo(L*0.12,HH*0.58, -L*0.23,HH*0.54, -L*0.42,0);
    ctx.fillStyle=rgb(sp.body); ctx.fill();

    // Pattern
    this._pattern(L,HH,sp);

    // Dorsal fin
    ctx.beginPath();
    ctx.moveTo(-L*0.18,-HH*0.5);
    ctx.quadraticCurveTo(0,-HH*(sp.pattern==='angel'?1.08:0.95),L*0.26,-HH*0.43);
    ctx.lineTo(L*0.02,-HH*0.5); ctx.closePath();
    ctx.fillStyle=rgb(blend(sp.tail,[255,255,255],0.08)); ctx.fill();

    // Belly fin
    ctx.beginPath();
    ctx.moveTo(L*0.06,HH*0.42);
    ctx.quadraticCurveTo(L*0.14,HH*0.95,L*0.22,HH*0.35);
    ctx.lineTo(L*0.1,HH*0.46); ctx.closePath();
    ctx.fillStyle=rgb(blend(sp.tail,[255,255,255],0.08)); ctx.fill();

    // Gill
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(L*0.24,-HH*0.25); ctx.lineTo(L*0.2,HH*0.28); ctx.stroke();

    // Eye
    ctx.beginPath(); ctx.arc(L*0.32,-HH*0.18,3.5*size,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.beginPath(); ctx.arc(L*0.34,-HH*0.17,1.8*size,0,Math.PI*2); ctx.fillStyle='rgb(8,14,22)'; ctx.fill();
    ctx.beginPath(); ctx.arc(L*0.35,-HH*0.23,0.8*size,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();

    ctx.restore();
  }
  _pattern(L,HH,sp){
    if(sp.pattern==='clown'){
      [[-L*0.2,6],[L*0.08,7],[L*0.33,5]].forEach(([cx2,w])=>{
        ctx.beginPath(); ctx.ellipse(cx2,0,w*this.size/2,HH*0.54,0,0,Math.PI*2);
        ctx.fillStyle='rgb(255,252,245)'; ctx.fill();
        ctx.strokeStyle='rgb(24,24,28)'; ctx.lineWidth=1.5; ctx.stroke();
      });
    } else if(sp.pattern==='tang'){
      ctx.beginPath(); ctx.moveTo(-L*0.25,-HH*0.35); ctx.lineTo(L*0.12,-HH*0.52);
      ctx.lineTo(L*0.32,-HH*0.16); ctx.lineTo(L*0.1,HH*0.2); ctx.lineTo(-L*0.18,HH*0.28); ctx.closePath();
      ctx.fillStyle='rgb(21,35,86)'; ctx.fill();
    } else if(sp.pattern==='gramma'){
      ctx.beginPath(); ctx.moveTo(L*0.02,-HH*0.5); ctx.lineTo(L*0.47,-HH*0.18);
      ctx.lineTo(L*0.5,0); ctx.lineTo(L*0.38,HH*0.28); ctx.lineTo(0,HH*0.5); ctx.lineTo(-L*0.08,0); ctx.closePath();
      ctx.fillStyle=rgb(sp.accent); ctx.fill();
    } else if(sp.pattern==='butterfly'){
      ctx.beginPath(); ctx.moveTo(-L*0.22,-HH*0.42); ctx.lineTo(L*0.08,-HH*0.5);
      ctx.lineTo(-L*0.08,HH*0.48); ctx.lineTo(-L*0.32,HH*0.32); ctx.closePath();
      ctx.fillStyle=rgb(sp.accent); ctx.fill();
      ctx.fillStyle='rgba(27,31,42,0.85)';
      ctx.beginPath(); ctx.rect(L*0.24,-HH*0.52,5*this.size,HH*1.04); ctx.fill();
    } else if(sp.pattern==='angel'){
      [-L*0.16,L*0.04,L*0.24].forEach(cx2=>{
        ctx.fillStyle=rgb(sp.accent);
        ctx.beginPath(); ctx.rect(cx2-2*this.size,-HH*0.52,4*this.size,HH*1.04); ctx.fill();
      });
    }
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────
const bubbles = Array.from({length:18},(_,i)=>new Bubble(true));
const fishList = [
  ...SPECIES.map(s=>new Fish(s)),
  ...SPECIES.map(s=>new Fish(s)),
  new Fish(SPECIES[0]), new Fish(SPECIES[1]),
];
let foods=[], castleTimer=0;

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  foods.push(new Food(e.clientX-r.left, e.clientY-r.top));
});

// ── LOOP ───────────────────────────────────────────────────────────────────
function loop(t){
  const sway=t/650;
  drawWater();
  drawGravel();
  drawPlant(95,H-42,92,sway); drawPlant(370,H-38,76,sway+1.4); drawPlant(690,H-40,108,sway+2.6);
  drawRock(145,H-62,72,38); drawRock(205,H-78,88,54); drawRock(610,H-64,96,42); drawRock(705,H-88,66,62);
  drawChest();
  drawCastle();
  drawSquid(t);

  bubbles.forEach(b=>{ b.update(); b.draw(); });
  foods.forEach(f=>f.update());

  if(t-castleTimer>3500){
    castleTimer=t;
    const idle=fishList.filter(f=>!f.waypoint);
    if(idle.length>0){
      const target=Math.random()<0.5?[CX-105,H-162]:[CX+105,H-162];
      idle[Math.floor(Math.random()*idle.length)].waypoint=target;
    }
  }

  fishList.forEach(f=>{ f.update(foods); f.draw(); });
  foods=foods.filter(f=>!f.eaten);
  drawGlass();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
